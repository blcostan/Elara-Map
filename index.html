<!DOCTYPE html>
<html>
<head>
    <title>Raleigh - Spire District</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <!-- Google Fonts for Sci-Fi Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <style>
        #map {
            height: 100vh;
            width: 100%;
            background-color: #0b0f19;
        }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        /* Enhances the Dark Matter tiles so roads render in glowing white */
        .leaflet-tile-pane {
            filter: brightness(180%) contrast(150%);
        }
        /* Custom Sci-Fi Label Overlay with Centered Text */
        .scifi-label {
            background: rgba(0, 240, 255, 0.15);
            border: 1px solid #00f0ff;
            color: #00f0ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            padding: 6px 12px;
            letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
            text-transform: uppercase;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }
        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background: #0b0f19;
            color: #00f0ff;
            border: 1px solid #00f0ff;
            font-family: 'Orbitron', sans-serif;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        // Initialize map centered over downtown Raleigh
        const map = L.map('map', {
            zoomControl: false
        }).setView([35.775, -78.635], 14);

        // Add CartoDB Dark Matter No-Labels basemap
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
            maxZoom: 20,
            subdomains: 'abcd',
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }).addTo(map);

        // Spire District Boundary Coordinates
        const spireCoords = [
            [35.804623, -78.623870],
            [35.792988, -78.624918],
            [35.792937, -78.612899],
            [35.769760, -78.614413],
            [35.757857, -78.612825],
            [35.753120, -78.623897],
            [35.754583, -78.638917],
            [35.754324, -78.641913],
            [35.769476, -78.648465],
            [35.770238, -78.648190],
            [35.774372, -78.655836],
            [35.777774, -78.650595],
            [35.778192, -78.650526],
            [35.788695, -78.651009],
            [35.788580, -78.643067],
            [35.804518, -78.623968]
        ];

        // Render the Spire District polygon overlay with sci-fi HUD styling
        const spirePolygon = L.polygon(spireCoords, {
            color: "#00f0ff",
            weight: 3,
            dashArray: '6, 6',
            fillColor: "#00f0ff",
            fillOpacity: 0.15
        }).addTo(map);

        spirePolygon.bindPopup(`<strong>SECTOR: SPIRE DISTRICT</strong><br>[DARK THEME ACTIVE]`);

        const labelCenter = spirePolygon.getBounds().getCenter();
        const scifiMarker = L.marker(labelCenter, {
            icon: L.divIcon({
                className: 'scifi-label',
                html: 'SPIRE DISTRICT',
                iconSize: [160, 36],
                iconAnchor: [80, 18]
            })
        }).addTo(map);
    </script>
</body>
</html>
