<!DOCTYPE html>
<html>
<head>
    <title>Raleigh - Spire, Green, and Sumptown Districts</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <!-- Google Fonts for Sci-Fi Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <style>
        #map {
            height: 100vh;
            width: 100%;
            background-color: #0b0f19;
        }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        /* Dark Matter tiles with high-contrast white roads */
        .leaflet-tile-pane {
            filter: brightness(180%) contrast(150%);
        }
        /* Sci-Fi Label for Spire District (Cyan) */
        .scifi-label-spire {
            background: transparent;
            border: none;
            color: #00f0ff;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.8), 0 0 20px rgba(0, 240, 255, 0.4);
            text-transform: uppercase;
            text-align: center;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transform: translate(-50%, -50%);
        }
        /* Sci-Fi Label for Green District (Neon Green) */
        .scifi-label-green {
            background: transparent;
            border: none;
            color: #28a745;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(40, 167, 69, 0.8), 0 0 20px rgba(40, 167, 69, 0.4);
            text-transform: uppercase;
            text-align: center;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transform: translate(-50%, -50%);
        }
        /* Sci-Fi Label for Sumptown (Polluted Indigo/Violet) */
        .scifi-label-sumptown {
            background: transparent;
            border: none;
            color: #a855f7;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.8), 0 0 20px rgba(168, 85, 247, 0.4);
            text-transform: uppercase;
            text-align: center;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transform: translate(-50%, -50%);
        }
        /* Custom Interactive POI Marker Styling (Violet/magenta glow) */
        .poi-pulse-marker {
            background: #d946ef;
            border: 2px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 10px #d946ef, 0 0 20px #d946ef;
            cursor: pointer;
        }
        /* Popup Theme Customization */
        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background: #0b0f19;
            color: #00f0ff;
            border: 1px solid #d946ef;
            font-family: 'Orbitron', sans-serif;
        }
        .story-popup {
            max-width: 280px;
            font-size: 11px;
            line-height: 1.4;
            color: #c0d0e0;
        }
        .story-popup h3 {
            color: #d946ef;
            margin: 0 0 8px 0;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .story-popup img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border: 1px solid #d946ef;
            margin-bottom: 8px;
            background-color: #1a1e2a;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Leaflet JS -->

            zoomControl: false

            subdomains: 'abcd',

            [35.788695, -78.651009], [35.788580, -78.643067], [35.804518, -78.623968]
        ];

        // Render Spire District (Cyan theme)
        const spirePolygon = L.polygon(spireCoords, {
            color: "#00f0ff", weight: 3, dashArray: '6, 6',
            fillColor: "#00f0ff", fillOpacity: 0.12
        }).addTo(map);

        const spireCenter = spirePolygon.getBounds().getCenter();
        const spireMarker = L.marker(spireCenter, {
            icon: L.divIcon({
                className: 'scifi-label-spire', html: 'SPIRE DISTRICT', iconSize: [0, 0]
            })
        }).addTo(map);

            [35.754893, -78.679786], [35.756769, -78.670554], [35.757326, -78.665232]
        ];

        // Render Green District (Neon Green theme)
        const greenPolygon = L.polygon(greenCoords, {
            color: "#28a745", weight: 3, dashArray: '6, 6',
            fillColor: "#28a745", fillOpacity: 0.12
        }).addTo(map);

        const greenCenter = greenPolygon.getBounds().getCenter();
        const adjustedGreenCenter = [greenCenter.lat - 0.008, greenCenter.lng + 0.0];

        const greenMarker = L.marker(adjustedGreenCenter, {
            icon: L.divIcon({
                className: 'scifi-label-green', html: 'GREEN DISTRICT', iconSize: [0, 0]
            })
        }).addTo(map);
