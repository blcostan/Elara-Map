<!DOCTYPE html>
<html>
<head>
    <title>Raleigh - Spire District Expanded</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <!-- Google Fonts for Sci-Fi Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <style>
        #map {
            height: 100vh;
            width: 100%;
            background-color: #0d1b2a;
        }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        /* Cyberpunk / Sci-Fi tactical map tile styling with zero text interference */
        .leaflet-tile-pane {
            filter: brightness(45%) contrast(160%) saturate(30%) hue-rotate(180deg);
        }
        /* Custom Sci-Fi Label Overlay */
        .scifi-label {
            background: rgba(0, 240, 255, 0.15);
            border: 1px solid #00f0ff;
            color: #00f0ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            padding: 6px 12px;
            letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
            text-transform: uppercase;
            white-space: nowrap;
        }
        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background: #0b0f19;
            color: #00f0ff;
            border: 1px solid #00f0ff;
            font-family: 'Orbitron', sans-serif;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        // Initialize map centered over expanded downtown/central Raleigh
        const map = L.map('map', {
            zoomControl: false
        }).setView([35.770, -78.645], 13);

        // Add CartoDB Positron No-Labels basemap (Clean, text-free black & white base)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
            maxZoom: 20,
            subdomains: 'abcd',
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
        }).addTo(map);

        // Expanded Spire District Coordinates 
        // Covers: Glenwood South (North), Warehouse District & Boylan Heights (West/Center), Caraleigh (Southwest), down to the I-440 Beltline (South)
        const spireCoords = [
            [35.802, -78.648], // North tip (Glenwood South upper boundary)
            [35.795, -78.632], // Northeast boundary (Capital Blvd/Downtown edge)
            [35.775, -78.625], // East boundary 
            [35.732, -78.620], // South boundary extending down to the I-440 corridor near Caraleigh
            [35.728, -78.675], // Southwest boundary (Caraleigh / Beltline perimeter)
            [35.750, -78.685], // West boundary (Boylan Heights / Western Blvd stretch)
            [35.785, -78.672]  // Northwest boundary enclosing upper Glenwood area
        ];

        // Render the expanded Spire District polygon overlay with a sci-fi HUD aesthetic
        const spirePolygon = L.polygon(spireCoords, {
            color: "#00f0ff",       // Cyan neon border
            weight: 3,
            dashArray: '6, 6',      // Tactical dashed grid perimeter
            fillColor: "#00f0ff",
            fillOpacity: 0.12       // Holographic translucent fill
        }).addTo(map);

        // Add interactive pop-up log
        spirePolygon.bindPopup(`<strong>SECTOR: SPIRE DISTRICT</strong><br>[EXPANDED CORE: Glenwood S. / Warehouse / Boylan / Caraleigh / I-440]`);

        // Permanently attach the glowing sci-fi text label to the center of the expanded district
        const labelCenter = spirePolygon.getBounds().getCenter();
        const scifiMarker = L.marker(labelCenter, {
            icon: L.divIcon({
                className: 'scifi-label',
                html: 'SPIRE DISTRICT',
                iconSize: [140, 30],
                iconOffset: [-70, -15]
            })
        }).addTo(map);
    </script>
</body>
</html>
