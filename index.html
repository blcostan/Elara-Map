<!DOCTYPE html>
<html>
<head>
    <title>Raleigh - Spire District</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <!-- Google Fonts for Sci-Fi Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <style>
        #map {
            height: 100vh;
            width: 100%;
            background-color: #0d1b2a;
        }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        /* Clean text-free sci-fi tactical map styling */
        .leaflet-tile-pane {
            filter: brightness(45%) contrast(160%) saturate(30%) hue-rotate(180deg);
        }
        /* Custom Sci-Fi Label Overlay */
        .scifi-label {
            background: rgba(0, 240, 255, 0.15);
            border: 1px solid #00f0ff;
            color: #00f0ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            padding: 6px 12px;
            letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
            text-transform: uppercase;
            white-space: nowrap;
        }
        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background: #0b0f19;
            color: #00f0ff;
            border: 1px solid #00f0ff;
            font-family: 'Orbitron', sans-serif;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        // Initialize map centered over downtown Raleigh
        const map = L.map('map', {
            zoomControl: false
        }).setView([35.775, -78.635], 14);

        // Add CartoDB Positron No-Labels basemap (Clean text-free black & white base)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
            maxZoom: 20,
            subdomains: 'abcd',
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }).addTo(map);

        // Spire District Boundary Coordinates with corrected southern I-40/I-440 corridor integration
        const spireCoords = [
            [35.804623, -78.623870], // Start point near Capital Blvd / Brookside
            [35.792988, -78.624918], // South along Brookside Dr
            [35.792937, -78.612899], // East along Glascock St
            [35.769760, -78.614413], // South along Raleigh Blvd
            [35.735000, -78.614413], // Continue south down Raleigh Blvd to meet the I-40 / I-440 beltline junction
            [35.728000, -78.650000], // Follow the I-40 / I-440 southern loop westward
            [35.732000, -78.675000], // Continuing along the southern beltline corridor past Caraleigh
            [35.769476, -78.648465], // North via Lake Wheeler Rd to S Saunders St
            [35.770238, -78.648190], // North to Western Blvd
            [35.774372, -78.655836], // West to train tracks
            [35.777774, -78.650595], // NE along train tracks
            [35.778192, -78.650526], // Transition point
            [35.788695, -78.651009], // Following St. Mary's St north
            [35.788580, -78.643067], // East on W Peace St
            [35.804518, -78.623968]  // North on Capital Blvd to complete loop
        ];

        // Render the exact Spire District polygon overlay with sci-fi HUD styling
        const spirePolygon = L.polygon(spireCoords, {
            color: "#00f0ff",       // Cyan neon border
            weight: 3,
            dashArray: '6, 6',      // Tactical dashed grid perimeter
            fillColor: "#00f0ff",
            fillOpacity: 0.15       // Holographic translucent fill
        }).addTo(map);

        // Add interactive pop-up log
        spirePolygon.bindPopup(`<strong>SECTOR: SPIRE DISTRICT</strong><br>[SOUTHERN BORDER: I-40 / I-440]`);

        // Permanently attach the glowing sci-fi text label to the center of the zone
        const labelCenter = spirePolygon.getBounds().getCenter();
        const scifiMarker = L.marker(labelCenter, {
            icon: L.divIcon({
                className: 'scifi-label',
                html: 'SPIRE DISTRICT',
                iconSize: [140, 30],
                iconOffset: [-70, -15]
            })
        }).addTo(map);
    </script>
</body>
</html>
