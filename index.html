<!DOCTYPE html>
<html>
<head>
    <title>Raleigh Custom Zones Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <style>
        #map {
            height: 100vh;
            width: 100%;
        }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        /* Greys out and tones down the background map tiles */
        .leaflet-tile-pane {
            filter: grayscale(100%) contrast(120%) brightness(125%) invert(15%);
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        // Initialize map centered over Raleigh
        const map = L.map('map').setView([35.7796, -78.6382], 13);

        // Add free OpenStreetMap base tiles
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Realigned polygon coordinates matching your zones layout
        const zones = [
            {
                name: "Industrial District",
                color: "#6c757d", // Grey (North/Northwest area)
                coords: [
                    [35.825, -78.665],
                    [35.830, -78.605],
                    [35.790, -78.600],
                    [35.785, -78.650]
                ]
            },
            {
                name: "Fringe City",
                color: "#fd7e14", // Orange (West/Northwest curve)
                coords: [
                    [35.795, -78.675],
                    [35.800, -78.610],
                    [35.750, -78.625],
                    [35.720, -78.665]
                ]
            },
            {
                name: "Green Zone",
                color: "#28a745", // Green (Southwest pocket)
                coords: [
                    [35.765, -78.660],
                    [35.775, -78.630],
                    [35.735, -78.635],
                    [35.725, -78.655]
                ]
            },
            {
                name: "Spire District",
                color: "#ffc107", // Yellow (Central core)
                coords: [
                    [35.785, -78.635],
                    [35.790, -78.600],
                    [35.725, -78.605],
                    [35.725, -78.635]
                ]
            },
            {
                name: "Downtown",
                color: "#f8f9fa", // Light Beige/Off-white
                coords: [
                    [35.790, -78.600],
                    [35.785, -78.570],
                    [35.730, -78.575],
                    [35.725, -78.605]
                ]
            },
            {
                name: "The Cinder",
                color: "#556b2f", // Olive Green (East side)
                coords: [
                    [35.795, -78.585],
                    [35.780, -78.535],
                    [35.720, -78.540],
                    [35.730, -78.575]
                ]
            },
            {
                name: "Sumptown",
                color: "#000000", // Black (Bottom strip)
                coords: [
                    [35.735, -78.590],
                    [35.735, -78.510],
                    [35.715, -78.510],
                    [35.715, -78.590]
                ]
            }
        ];

        // Render zones onto the map
        zones.forEach(zone => {
            const polygon = L.polygon(zone.coords, {
                color: zone.color,
                weight: 2,
                fillColor: zone.color,
                fillOpacity: 0.5
            }).addTo(map);

            polygon.bindPopup(`<strong>${zone.name}</strong>`);
        });
    </script>
</body>
</html>
