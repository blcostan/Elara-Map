<!DOCTYPE html>
<html>
<head>
    <title>Raleigh - Spire District</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <!-- Google Fonts for Sci-Fi Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <style>
        #map {
            height: 100vh;
            width: 100%;
            background-color: #0d1b2a;
        }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        /* Brightens and hue-shifts the road grid into a neon aesthetic */
        .leaflet-tile-pane {
            filter: brightness(50%) contrast(160%) saturate(40%) hue-rotate(180deg);
        }
        /* Hides default map text/labels burned into standard tiles */
        .leaflet-overlay-pane svg text, 
        .leaflet-marker-icon, 
        .leaflet-shadow-pane {
            display: none !important;
        }
        /* Custom Sci-Fi Label Overlay for the Spire District */
        .scifi-label {
            background: rgba(0, 240, 255, 0.15);
            border: 1px solid #00f0ff;
            color: #00f0ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            padding: 6px 12px;
            letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
            text-transform: uppercase;
            white-space: nowrap;
        }
        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background: #0b0f19;
            color: #00f0ff;
            border: 1px solid #00f0ff;
            font-family: 'Orbitron', sans-serif;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        // Initialize map centered over Downtown Raleigh (The Spire District)
        const map = L.map('map', {
            zoomControl: false
        }).setView([35.7796, -78.6382], 15);

        // Add free OpenStreetMap base tiles
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Spire District (Downtown Raleigh Core) Polygon Coordinates
        const spireCoords = [
            [35.788, -78.648],
            [35.792, -78.625],
            [35.785, -78.605],
            [35.768, -78.602],
            [35.755, -78.618],
            [35.758, -78.645]
        ];

        // Render the Spire District polygon overlay
        const spirePolygon = L.polygon(spireCoords, {
            color: "#00f0ff",       
            weight: 3,
            dashArray: '6, 6',      
            fillColor: "#00f0ff",
            fillOpacity: 0.15       
        }).addTo(map);

        // Add interactive pop-up log
        spirePolygon.bindPopup(`<strong>SECTOR: SPIRE DISTRICT</strong><br>[DOWNTOWN CORE INITIALIZED]`);

        // Permanently attach the glowing sci-fi text label to the center
        const labelCenter = spirePolygon.getBounds().getCenter();
        const scifiMarker = L.marker(labelCenter, {
            icon: L.divIcon({
                className: 'scifi-label',
                html: 'SPIRE DISTRICT',
                iconSize: [140, 30],
                iconOffset: [-70, -15]
            })
        }).addTo(map);
    </script>
</body>
</html>
